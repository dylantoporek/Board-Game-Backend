<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <defs>
    <clipPath id="f"><rect width="32" height="32" rx="5"/></clipPath>
  </defs>
  <g clip-path="url(#f)">
    <rect width="32" height="32" fill="#131c2b"/>
    <!-- stars -->
    <rect x="3" y="4" width="1" height="1" fill="#f2f5f9"/>
    <rect x="7" y="2" width="1" height="1" fill="#f2f5f9"/>
    <rect x="2" y="11" width="1" height="1" fill="#f2f5f9"/>
    <rect x="6" y="15" width="1" height="1" fill="#f2f5f9"/>
    <rect x="26" y="8" width="1" height="1" fill="#f2f5f9"/>
    <rect x="29" y="13" width="1" height="1" fill="#f2f5f9"/>
    <rect x="24" y="16" width="1" height="1" fill="#f2f5f9"/>
    <rect x="30" y="3" width="1" height="1" fill="#f2f5f9"/>
    <!-- moon -->
    <rect x="24" y="2" width="4" height="2" fill="#aab4c4"/>
    <rect x="25" y="4" width="4" height="2" fill="#aab4c4"/>
    <rect x="27" y="1" width="2" height="1" fill="#aab4c4"/>
    <!-- grass -->
    <rect x="0" y="27" width="32" height="5" fill="#3d6a3a"/>
    <rect x="0" y="27" width="32" height="1" fill="#4a7d46"/>
    <!-- castle -->
    <g transform="translate(4 7)">
      <!-- flag + pole -->
      <rect x="8" y="0" width="5" height="3" fill="#f07568"/>
      <rect x="13" y="1" width="1" height="3" fill="#e9edf3"/>
      <!-- center tower -->
      <rect x="8" y="4" width="2" height="1" fill="#9fabbc"/>
      <rect x="11" y="4" width="2" height="1" fill="#9fabbc"/>
      <rect x="14" y="4" width="2" height="1" fill="#9fabbc"/>
      <rect x="8" y="5" width="7" height="15" fill="#9fabbc"/>
      <rect x="15" y="5" width="1" height="15" fill="#5f6b7d"/>
      <rect x="11" y="6" width="2" height="2" fill="#2c3547"/>
      <!-- side towers -->
      <rect x="2" y="9" width="2" height="1" fill="#8b97a9"/>
      <rect x="6" y="9" width="2" height="1" fill="#8b97a9"/>
      <rect x="16" y="9" width="2" height="1" fill="#8b97a9"/>
      <rect x="20" y="9" width="2" height="1" fill="#8b97a9"/>
      <rect x="2" y="10" width="6" height="10" fill="#8b97a9"/>
      <rect x="16" y="10" width="5" height="10" fill="#8b97a9"/>
      <rect x="21" y="10" width="1" height="10" fill="#5f6b7d"/>
      <rect x="4" y="11" width="2" height="2" fill="#2c3547"/>
      <rect x="18" y="11" width="2" height="2" fill="#2c3547"/>
      <rect x="4" y="14" width="2" height="2" fill="#2c3547"/>
      <rect x="18" y="14" width="2" height="2" fill="#2c3547"/>
      <!-- gate -->
      <rect x="10" y="14" width="4" height="6" fill="#5a4332"/>
      <rect x="13" y="16" width="1" height="4" fill="#3c2d22"/>
    </g>
  </g>
</svg>
